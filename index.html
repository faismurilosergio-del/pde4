<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão PDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBshYvEFAzYwQPI8R2JTx02B-30Lpriilc",
            authDomain: "bemf-pde.firebaseapp.com",
            projectId: "bemf-pde",
            storageBucket: "bemf-pde.firebasestorage.app",
            messagingSenderId: "742435947116",
            appId: "1:742435947116:web:d01298e4918b74ad108e49"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tasksCol = collection(db, "tasks");

        // Função interna para desenhar a tabela
        function drawTable(data) {
            const tbody = document.getElementById('taskTableBody');
            if (!tbody) return;
            tbody.innerHTML = '';
            
            data.forEach(t => {
                const row = tbody.insertRow();
                row.className = "border-b hover:bg-slate-50";
                row.innerHTML = `
                    <td class="p-4"><b class="text-indigo-600 text-xs">${t.project || 'PDE'}</b></td>
                    <td class="p-4"><div class="font-bold">${t.title || 'Sem Título'}</div></td>
                    <td class="p-4 text-slate-500">${t.owner || '-'}</td>
                    <td class="p-4"><span class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-[10px] font-bold uppercase">${t.status || 'andamento'}</span></td>
                `;
            });
        }

        // Escuta o banco de dados
        onSnapshot(tasksCol, (snap) => {
            console.log("DEBUG: Dados recebidos!");
            const tasks = [];
            snap.forEach(d => tasks.push(d.data()));
            
            // Esconde o carregamento
            const loader = document.getElementById('loadingOverlay');
            if(loader) loader.style.display = 'none';

            drawTable(tasks);
        });
    </script>
    <style>
        #loadingOverlay { position: fixed; inset: 0; background: #0f172a; z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; color: white; font-family: sans-serif; }
        .spinner { width: 40px; height: 40px; border: 4px solid #334155; border-top: 4px solid #6366f1; border-radius: 50%; animation: spin 1s linear infinite; mb: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100">

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <p>Sincronizando com Firebase...</p>
    </div>

    <header class="bg-white p-6 border-b flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-black italic">GESTÃO <span class="text-indigo-600">PDE</span></h1>
        <div class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded">● SISTEMA ATIVO</div>
    </header>

    <main class="p-6 max-w-5xl mx-auto">
        <div class="bg-white rounded-xl shadow-sm overflow-hidden border">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 text-[10px] uppercase text-slate-400 font-bold border-b">
                    <tr>
                        <th class="p-4">Empreendimento</th>
                        <th class="p-4">Atividade</th>
                        <th class="p-4">Quem</th>
                        <th class="p-4">Status</th>
                    </tr>
                </thead>
                <tbody id="taskTableBody" class="text-sm text-slate-700">
                    </tbody>
            </table>
        </div>
    </main>

</body>
</html>
